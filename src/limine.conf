# Limine protocol sets up long mode, identity-maps memory, and provides boot info,
# so our kernel doesn't need its own bootloader setup code.
#
# kernel.elf must be a 64-bit ELF executable with entry point _start.
# Limine loads it at the address specified in the ELF headers and jumps to _start.

timeout: 0                          # Boot immediately

/Seed OS                            # Boot menu entry
    protocol: limine                # Limine boot protocol
    path: boot():/boot/kernel.elf   # Kernel location
